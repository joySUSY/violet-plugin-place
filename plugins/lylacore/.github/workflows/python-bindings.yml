# Authors: Joysusy & Violet Klaudia 💖

name: Python Bindings CI

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'crates/lyl-xylem-py/**'
      - '.github/workflows/python-bindings.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'crates/lyl-xylem-py/**'

jobs:
  test:
    name: Test Python ${{ matrix.python-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.9', '3.10', '3.11', '3.12']

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # master/stable
        with:
          toolchain: stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@9d47c6ad4b02e050fd481d890b2ea34778fd09d6 # v2.7.8
        with:
          workspaces: "."

      - name: Install uv
        run: pip install uv

      - name: Install maturin
        run: uv pip install --system maturin

      - name: Build wheel
        working-directory: crates/lyl-xylem-py
        run: maturin build --release

      - name: Install wheel
        working-directory: crates/lyl-xylem-py
        shell: bash
        run: |
          WHEEL=$(ls ../../target/wheels/lylacore-*.whl | head -1)
          uv pip install --system "$WHEEL"

      - name: Install test dependencies
        run: uv pip install --system pytest pytest-cov pytest-asyncio hypothesis

      - name: Run tests
        working-directory: crates/lyl-xylem-py
        run: pytest -v

  build-wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # master/stable
        with:
          toolchain: stable

      - name: Build wheels
        uses: PyO3/maturin-action@86b9d133d34bc1b40018696f782949dac11bd380 # v1.49.4
        with:
          working-directory: crates/lyl-xylem-py
          args: --release --out dist
          manylinux: auto

      - name: Upload wheels
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: wheels-${{ matrix.os }}
          path: crates/lyl-xylem-py/dist/*.whl

  lint:
    name: Lint and format check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # master/stable
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@9d47c6ad4b02e050fd481d890b2ea34778fd09d6 # v2.7.8

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.12'

      - name: Install ruff
        run: pip install ruff

      - name: Lint Python code
        working-directory: crates/lyl-xylem-py
        run: |
          ruff check python/ tests/
          ruff format --check python/ tests/

  coverage:
    name: Code coverage
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.12'

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # master/stable
        with:
          toolchain: stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@9d47c6ad4b02e050fd481d890b2ea34778fd09d6 # v2.7.8

      - name: Install uv
        run: pip install uv

      - name: Install maturin
        run: uv pip install --system maturin

      - name: Build wheel
        working-directory: crates/lyl-xylem-py
        run: maturin build --release

      - name: Install wheel and test dependencies
        working-directory: crates/lyl-xylem-py
        shell: bash
        run: |
          WHEEL=$(ls ../../target/wheels/lylacore-*.whl | head -1)
          uv pip install --system "$WHEEL"
          uv pip install --system pytest pytest-cov pytest-asyncio hypothesis

      - name: Run tests with coverage
        working-directory: crates/lyl-xylem-py
        run: pytest --cov=lylacore --cov-report=xml --cov-report=term

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@b9fd7d16f6d7d1b5d2bec1a2887e65ceed900238 # v4.6.0
        with:
          files: crates/lyl-xylem-py/coverage.xml
          flags: python-bindings
          name: python-bindings-coverage
